// ========================================================================
// COMPARTIR (WEB SHARE API) Y ENVIAR POR CORREO + ADJUNTAR DOCX SI ES POSIBLE
// ========================================================================
async function cc25Compartir(){
  const fase = document.getElementById('cc25Fase').value;
  const sub = document.getElementById('cc25Sub').value;
  const items = [...document.querySelectorAll('#cc25Checklist input[type="text"]')].map(i => '• ' + i.value).join("
");

  const texto = `Checklist ${fase.toUpperCase()} - ${sub}

${items}`;

  // GENERAR DOCX PARA COMPARTIR
  let file;
  try{
    file = await cc25GenerarDocxFile(fase, sub);
  }catch{}

  if(navigator.share){
    try{
      if(file){
        await navigator.share({
          title: 'Checklist Cierre Contable 2025',
          text: texto,
          files: [file]
        });
      } else {
        await navigator.share({ title: 'Checklist Cierre Contable 2025', text: texto });
      }
    }catch{}
  } else {
    alert('Tu dispositivo no soporta compartir directamente con archivo adjunto');
  }
}

async function cc25EnviarCorreo(){
  const fase = document.getElementById('cc25Fase').value;
  const sub = document.getElementById('cc25Sub').value;
  const items = [...document.querySelectorAll('#cc25Checklist input[type="text"]')].map(i => '%0A• ' + encodeURIComponent(i.value)).join('');
  const subject = encodeURIComponent(`Checklist ${fase} - ${sub}`);
  const body = `Checklist%20${fase}%20-%20${sub}%0A${items}`;

  // Intento de adjuntar archivo vía Web Share API
  try{
    const file = await cc25GenerarDocxFile(fase, sub);
    if(navigator.share && file){
      await navigator.share({
        title: subject,
        text: decodeURIComponent(body),
        files: [file]
      });
      return;
    }
  }catch{}

  // Fallback universal sin adjunto
  window.location.href = `mailto:?subject=${subject}&body=${body}`;

let cc25Actual = [];

// =======================================================================================
// SUBCATEGORÍAS AUTOMÁTICAS Y LÓGICA
// =======================================================================================
function cc25GetSubcategorias(fase) {
  const items = cc25Fases[fase] || [];
  const subs = new Set();
  items.forEach(i => {
    if(i.includes(':')) subs.add(i.split(':')[0].trim());
    else subs.add('General');
  });
  return Array.from(subs);
}

function cc25ActualizarSubSelect(){
  const fase = document.getElementById('cc25Fase').value;
  const subSelect = document.getElementById('cc25Sub');
  const subs = cc25GetSubcategorias(fase);
  subSelect.innerHTML = subs.map(s => `<option value="${s}">${s}</option>`).join('');
}

function cc25ActualizarItems(){
  const fase = document.getElementById('cc25Fase').value;
  const sub = document.getElementById('cc25Sub').value;
  const items = cc25Fases[fase] || [];

  cc25Actual = items.filter(i => {
    if(sub === 'General') return i.startsWith('General:') || !i.includes(':');
    return i.startsWith(sub + ':');
  }).map(i => {
    // remover prefijo 'Sub: ' si existe
    return i.includes(':') ? i.split(':').slice(1).join(':').trim() : i;
  });

  cc25Render();
}

// ========================================================================
// RENDERIZAR
// ========================================================================
function cc25Render() {
  const box = document.getElementById('cc25Checklist');
  box.innerHTML = '';

  if(cc25Actual.length === 0){
    box.innerHTML = '<div class="cc25-empty">No hay ítems en esta subcategoría.</div>';
    return;
  }

  cc25Actual.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'cc25-item';
    const safe = String(item).replace(/</g,'&lt;').replace(/>/g,'&gt;');

    div.innerHTML = `
      <div style="flex:1; display:flex; align-items:center; gap:10px;">
        <input type="checkbox" id="cc25chk${i}">
        <input type="text" value="${safe}" data-idx="${i}">
      </div>
      <button class="cc25-delete" type="button" data-idx="${i}">🗑</button>
    `;

    box.appendChild(div);
  });

  // attach delete listeners
  box.querySelectorAll('.cc25-delete').forEach(btn => btn.addEventListener('click', ev => {
    const idx = Number(ev.currentTarget.dataset.idx);
    cc25Eliminar(idx);
  }));
}

// ========================================================================
// FUNCIONES CRUD
// ========================================================================
function cc25Agregar() {
  cc25Actual.push('Nuevo ítem...');
  cc25Render();
}

function cc25Eliminar(i) {
  cc25Actual.splice(i, 1);
  cc25Render();
}

// ========================================================================
// GUARDAR / CARGAR (LOCALSTORAGE)
// ========================================================================
function cc25Guardar() {
  const fase = document.getElementById('cc25Fase').value;
  const sub = document.getElementById('cc25Sub').value;
  // reconstruir la estructura completa: reemplazar la parte correspondiente en cc25Fases[fase]
  const itemsText = [...document.querySelectorAll('#cc25Checklist input[type="text"]')].map(i => i.value);

  // crear prefijos
  const prefixed = itemsText.map(t => `${sub}: ${t}`);

  // eliminar antiguos de la misma sub y reemplazar
  const original = cc25Fases[fase] || [];
  const filtered = original.filter(i => {
    if(i.includes(':')) return !i.startsWith(sub + ':');
    return sub !== 'General';
  });
  cc25Fases[fase] = [...filtered, ...prefixed];

  // guardar todo el array del fase en localStorage
  localStorage.setItem('cc25_' + fase, JSON.stringify(cc25Fases[fase]));
  alert('Checklist guardado para fase: ' + fase + ' / sub: ' + sub);
}

function cc25Cargar() {
  const fase = document.getElementById('cc25Fase').value;
  const loaded = localStorage.getItem('cc25_' + fase);
  if(!loaded) return alert('No hay checklist guardado para esta fase');
  try{
    cc25Fases[fase] = JSON.parse(loaded);
    cc25ActualizarSubSelect();
    cc25ActualizarItems();
  } catch(e){
    alert('Error cargando datos guardados');
  }
}

// ========================================================================
// EXPORTAR WORD
// ========================================================================
async function cc25Word() {
  const fase = document.getElementById('cc25Fase').value;
  const sub = document.getElementById('cc25Sub').value;
  const items = [...document.querySelectorAll('#cc25Checklist input[type="text"]')].map(i => i.value);

  if(!window.docx){ alert('La librería docx no está cargada'); return; }
  const { Document, Packer, Paragraph, TextRun, HeadingLevel } = window.docx;

  const doc = new Document({
    sections: [{
      children: [
        new Paragraph({ children: [ new TextRun({ text: `Checklist ${fase.toUpperCase()} - ${sub}`, bold: true, size: 28 }) ], heading: HeadingLevel.HEADING_1 }),
        ...items.map(t => new Paragraph({ children: [ new TextRun(`☐ ${t}`) ] }))
      ]
    }]
  });

  const blob = await Packer.toBlob(doc);
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `Checklist_${fase}_${sub}.docx`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(link.href);
}

// ========================================================================
// EXPORTAR EXCEL
// ========================================================================
function cc25Excel() {
  const fase = document.getElementById('cc25Fase').value;
  const sub = document.getElementById('cc25Sub').value;
  const rows = [...document.querySelectorAll('#cc25Checklist input[type="text"]')].map((e, idx) => ({
    'Ítem': e.value,
    'Marcado': document.getElementById('cc25chk' + idx)?.checked ? 'Sí' : 'No'
  }));

  if(!window.XLSX){ alert('La librería XLSX no está cargada'); return; }
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Checklist');
  XLSX.writeFile(wb, `Checklist_${fase}_${sub}.xlsx`);
}
