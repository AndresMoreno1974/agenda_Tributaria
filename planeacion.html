<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeación Fiscal Comparativa</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React Libraries -->
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <!-- Babel to transpile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Recharts Library -->
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const {
          BarChart, Bar, XAxis, YAxis, Tooltip, Legend, ResponsiveContainer,
          PieChart, Pie, Cell,
        } = Recharts;

        const DEFAULT_TAX_PARAMS = {
          ordinario: {
            renta: {
              brackets: [
                { upTo: 50000000, rate: 0.0 },
                { upTo: 150000000, rate: 0.19 },
                { upTo: Infinity, rate: 0.33 },
              ],
            },
            iva_rate: 0.19,
            parafiscales_pct_nomina: 0.09,
          },
          simple: {
            coefficient: 0.02,
            discounts: 0.0,
          },
        };

        function formatCOP(x) {
          return x?.toLocaleString('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 });
        }

        function calcularRentaOrdinaria(scenario, params) {
          const base = Math.max(0, scenario.ingresos - scenario.costos_operativos - scenario.nomina);
          let impuesto = 0;
          let remaining = base;
          let lower = 0;
          for (const bracket of params.renta.brackets) {
            const upper = bracket.upTo === Infinity ? Infinity : bracket.upTo;
            const taxable = Math.max(0, Math.min(remaining, upper - lower));
            impuesto += taxable * bracket.rate;
            remaining -= taxable;
            lower = upper;
            if (remaining <= 0) break;
          }
          const iva = scenario.iva_repercutido || 0;
          const parafiscales = (params.parafiscales_pct_nomina || 0) * scenario.nomina;
          return {
            base,
            impuesto_renta: impuesto,
            iva,
            parafiscales,
            total: impuesto + iva + parafiscales,
          };
        }

        function calcularImpuestoSimple(scenario, params) {
          const bruto = scenario.ingresos;
          const impuesto_unico = Math.max(0, bruto * (params.coefficient || 0) - (params.discounts || 0));
          return {
            impuesto_unico,
            total: impuesto_unico,
          };
        }

        function calcularComparativa(scenario, tax_params) {
          const result = {};
          const ord = calcularRentaOrdinaria(scenario, tax_params.ordinario);
          result.ordinario = {
            impuestos: { renta: ord.impuesto_renta, iva: ord.iva, parafiscales: ord.parafiscales },
            total: ord.total,
            flujo_neto: scenario.ingresos - scenario.costos_operativos - ord.total - scenario.nomina,
            detalle: ord,
          };
          const sim = calcularImpuestoSimple(scenario, tax_params.simple);
          result.simple = {
            impuestos: { impuesto_unico_simple: sim.impuesto_unico },
            total: sim.total,
            flujo_neto: scenario.ingresos - scenario.costos_operativos - sim.total - scenario.nomina,
            detalle: sim,
          };
          result.summary = {
            diferencia: result.ordinario.total - result.simple.total,
            porcentaje_ahorro:
              result.ordinario.total > 0 ? (result.ordinario.total - result.simple.total) / result.ordinario.total : 0,
          };
          return result;
        }

        function downloadCSV(filename, rows) {
          const csv = [Object.keys(rows[0]).join(','), ...rows.map((r) => Object.values(r).join(','))].join('\n');
          const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          const link = document.createElement('a');
          const url = URL.createObjectURL(blob);
          link.setAttribute('href', url);
          link.setAttribute('download', filename);
          link.style.display = 'none';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }

        function CalculadoraComparativa() {
          const [taxParams, setTaxParams] = useState(DEFAULT_TAX_PARAMS);
          const [scenario, setScenario] = useState({
            company_id: 1,
            period: '2025',
            ingresos: 120000000,
            costos_operativos: 60000000,
            nomina: 24000000,
            retenciones_ica: 0,
            iva_repercutido: 18000000,
          });
          const [name, setName] = useState('Escenario demo 2025');
          const results = useMemo(() => calcularComparativa(scenario, taxParams), [scenario, taxParams]);
          const chartData = [
            { name: 'Ordinario', impuesto: results.ordinario.total },
            { name: 'Simple', impuesto: results.simple.total },
          ];
          const breakdownOrdinario = Object.entries(results.ordinario.impuestos).map(([k, v]) => ({ name: k, value: v }));
          const breakdownSimple = Object.entries(results.simple.impuestos).map(([k, v]) => ({ name: k, value: v }));

          function handleInputChange(e) {
            const { name, value } = e.target;
            setScenario((s) => ({ ...s, [name]: Number(value) }));
          }

          function exportCSV() {
            const rows = [
              { regime: 'ordinario', total: results.ordinario.total, flujo_neto: results.ordinario.flujo_neto },
              { regime: 'simple', total: results.simple.total, flujo_neto: results.simple.flujo_neto },
            ];
            downloadCSV(`${name.replace(/\s+/g, '_')}_comparativa.csv`, rows);
          }

          function exportToGoogleCalendar() {
            const title = encodeURIComponent(`${name} — Obligación tributaria (estimada)`);
            const details = encodeURIComponent(`Ordinario: ${formatCOP(results.ordinario.total)} | Simple: ${formatCOP(results.simple.total)}`);
            const start = new Date();
            const end = new Date(start.getTime() + 60 * 60 * 1000);
            const dates = `${start.toISOString().replace(/-|:|\.\d+/g, '')}/${end.toISOString().replace(/-|:|\.\d+/g, '')}`;
            const url = `https://calendar.google.com/calendar/r/eventedit?text=${title}&details=${details}&dates=${dates}`;
            window.open(url, '_blank');
          }

          return (
            <div className="p-6 max-w-6xl mx-auto">
              <header className="mb-6">
                <h1 className="text-2xl font-bold">Calculadora comparativa: Régimen Ordinario vs SIMPLE</h1>
                <p className="text-sm text-gray-600">Editable — tasas y coeficientes parametrizables (admin)</p>
              </header>
              <section className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div className="p-4 border rounded-lg">
                  <h2 className="font-semibold mb-3">Formulario de entrada</h2>
                  <label className="block text-sm">Nombre escenario</label>
                  <input value={name} onChange={(e) => setName(e.target.value)} className="w-full p-2 border rounded mb-3" />
                  <label className="block text-sm">Ingresos (COP)</label>
                  <input name="ingresos" value={scenario.ingresos} onChange={handleInputChange} className="w-full p-2 border rounded mb-3" />
                  <label className="block text-sm">Costos operativos (COP)</label>
                  <input name="costos_operativos" value={scenario.costos_operativos} onChange={handleInputChange} className="w-full p-2 border rounded mb-3" />
                  <label className="block text-sm">Nómina (COP)</label>
                  <input name="nomina" value={scenario.nomina} onChange={handleInputChange} className="w-full p-2 border rounded mb-3" />
                  <label className="block text-sm">IVA repercutido (COP)</label>
                  <input name="iva_repercutido" value={scenario.iva_repercutido} onChange={handleInputChange} className="w-full p-2 border rounded mb-3" />
                  <div className="flex gap-2 mt-3">
                    <button onClick={exportCSV} className="px-3 py-2 bg-blue-600 text-white rounded">Exportar CSV</button>
                    <button onClick={exportToGoogleCalendar} className="px-3 py-2 bg-green-600 text-white rounded">Exportar a Google Calendar</button>
                  </div>
                </div>
                <div className="p-4 border rounded-lg">
                  <h2 className="font-semibold mb-3">Resumen rápido</h2>
                  <div className="grid grid-cols-1 gap-2">
                    <div className="flex justify-between"><span>Impuesto total (Ordinario)</span><strong>{formatCOP(results.ordinario.total)}</strong></div>
                    <div className="flex justify-between"><span>Impuesto total (Simple)</span><strong>{formatCOP(results.simple.total)}</strong></div>
                    <div className="flex justify-between"><span>Ahorro estimado al elegir SIMPLE</span><strong>{formatCOP(results.summary.diferencia)}</strong></div>
                    <div className="flex justify-between"><span>% Ahorro</span><strong>{(results.summary.porcentaje_ahorro * 100).toFixed(2)}%</strong></div>
                  </div>
                </div>
              </section>
              <section className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
                <div className="col-span-1 p-4 border rounded-lg">
                  <h3 className="font-semibold mb-3">Comparativa (barras)</h3>
                  <div style={{ width: '100%', height: 220 }}>
                    <ResponsiveContainer>
                      <BarChart data={chartData}>
                        <XAxis dataKey="name" />
                        <YAxis />
                        <Tooltip />
                        <Legend />
                        <Bar dataKey="impuesto" name="Impuesto total" />
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>
                <div className="col-span-1 p-4 border rounded-lg">
                  <h3 className="font-semibold mb-3">Desglose Ordinario (pie)</h3>
                  <div style={{ width: '100%', height: 220 }}>
                    <ResponsiveContainer>
                      <PieChart>
                        <Pie data={breakdownOrdinario} dataKey="value" nameKey="name" outerRadius={80} label>
                          {breakdownOrdinario.map((entry, idx) => <Cell key={`cell-${idx}`} />)}
                        </Pie>
                        <Tooltip />
                      </PieChart>
                    </ResponsiveContainer>
                  </div>
                </div>
                <div className="col-span-1 p-4 border rounded-lg">
                  <h3 className="font-semibold mb-3">Desglose SIMPLE (pie)</h3>
                  <div style={{ width: '100%', height: 220 }}>
                    <ResponsiveContainer>
                      <PieChart>
                        <Pie data={breakdownSimple} dataKey="value" nameKey="name" outerRadius={80} label>
                          {breakdownSimple.map((entry, idx) => <Cell key={`cell-s-${idx}`} />)}
                        </Pie>
                        <Tooltip />
                      </PieChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              </section>
              <section className="p-4 border rounded-lg mb-6">
                <h3 className="font-semibold mb-3">Detalle numérico</h3>
                <pre className="text-xs bg-gray-50 p-3 rounded overflow-auto">{JSON.stringify(results, null, 2)}</pre>
              </section>
              <footer className="text-sm text-gray-500">Disclaimer: estimaciones orientativas — consulte con un contador.</footer>
            </div>
          );
        }

        ReactDOM.render(<CalculadoraComparativa />, document.getElementById('root'));
    </script>
</body>
</html>
