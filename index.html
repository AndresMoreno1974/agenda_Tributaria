<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comparative Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f9fafb; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    h1 { font-size: 24px; margin-bottom: 20px; }
    input { border: 1px solid #ccc; padding: 8px; margin-bottom: 10px; width: 250px; }
    button { background-color: #2563eb; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background-color: #1d4ed8; }
  </style>
</head>
<body>
  <h1>Comparative Calculator</h1>
  <input type="text" id="option1" placeholder="Option 1" />
  <input type="text" id="option2" placeholder="Option 2" />
  <button onclick="generatePDF()">Generate PDF</button>

  <script>
    async function generatePDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const option1 = document.getElementById('option1').value;
      const option2 = document.getElementById('option2').value;

      const imgUrl = "https://contador.net.co/wp-content/uploads/2025/08/logo-sin-bordes.png";
      const img = await fetch(imgUrl).then(res => res.blob()).then(blob => new Promise(resolve => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      }));

      doc.addImage(img, "PNG", 10, 10, 40, 20);
      doc.setFontSize(16);
      doc.text("Comparative Calculator Results", 10, 40);
      doc.setFontSize(12);
      doc.text(`Option 1: ${option1}`, 10, 50);
      doc.text(`Option 2: ${option2}`, 10, 60);
      doc.text(`Comparison: ${option1} vs ${option2}`, 10, 70);

      doc.save("comparison.pdf");
    }
  </script>
</body>
</html>
