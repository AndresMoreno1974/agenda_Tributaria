<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Podcast: Tarifas y pagos del Contador Público</title>
  <meta name="description" content="Podcast sobre cómo definir y cobrar tarifas como Contador Público en Colombia: modalidades de contratación, factores de precio y recomendaciones prácticas.">

  <style>
    /* Estilos generales del cuerpo */
    body {
      margin: 0;
      font-family: "Roboto", Arial, sans-serif;
      background-color: #f0f2f5;
      color: #333;
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
      padding: 20px;
    }

    /* Contenedor principal del podcast */
    .podcast-container {
      background-color: #ffffff;
      max-width: 550px;
      margin: 30px auto;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    /* Estilo del título */
    h1 {
      color: #0d2c54;
      font-size: 14px !important; /* <-- TAMAÑO AJUSTADO A 14PX */
      margin-bottom: 10px;
      font-weight: 600;
    }

    /* Estilo del párrafo de descripción */
    p {
      margin-bottom: 25px;
      color: #555;
      font-size: 15px;
      font-weight: 400;
    }

    /* Estilo del reproductor de audio */
    audio {
      width: 100%;
      margin: 20px 0;
      border-radius: 8px;
    }

    /* Estilo del botón de descarga */
    .download-button {
      display: inline-block;
      background-color: #28a745;
      color: #ffffff;
      padding: 12px 25px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      margin-top: 15px;
      transition: background-color 0.3s ease, transform 0.2s ease;
      border: none;
      cursor: pointer;
    }

    /* Efecto al pasar el mouse sobre el botón */
    .download-button:hover {
      background-color: #218838;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="podcast-container">
    <h1>🎙️ Podcast: Tarifas y pagos del Contador Público</h1>
    <p>Un espacio para hablar sobre cómo fijar honorarios contables, modalidades de contratación y factores que influyen en las tarifas.</p>

    <audio controls preload="metadata">
      <source src="https://contador.net.co/wp-content/uploads/2025/08/Contadores_2025__Guias_VS.mp3" type="audio/mpeg">
      Tu navegador no soporta el elemento <code>audio</code>.
    </audio>

    <a href="https://contador.net.co/wp-content/uploads/2025/08/Contadores_2025__Guias_VS.mp3" class="download-button" download>
      Descargar Podcast
    </a>
  </div>

</body>
</html>
